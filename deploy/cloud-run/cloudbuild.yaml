substitutions:
  _REGION: us-central1
  _SERVICE_NAME: protokoll-mcp
  _AR_REPO: protokoll
  _IMAGE_NAME: protokoll-mcp
  _SERVICE_ACCOUNT: protokoll-runtime@${PROJECT_ID}.iam.gserviceaccount.com
  _ENV_VARS_FILE: deploy/cloud-run/env.example.yaml
  _OPENAI_SECRET: protokoll-openai-api-key
  _REQUEST_TIMEOUT: "3600"
  _MIN_INSTANCES: "1"

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - -f
      - deploy/cloud-run/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${BUILD_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: verify-ffmpeg
    args:
      - run
      - --rm
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${BUILD_ID}
      - sh
      - -c
      - ffmpeg -version && ffprobe -version

  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${BUILD_ID}

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${BUILD_ID}
      - --service-account=${_SERVICE_ACCOUNT}
      - --env-vars-file=${_ENV_VARS_FILE}
      - --update-secrets=OPENAI_API_KEY=${_OPENAI_SECRET}:latest
      - --timeout=${_REQUEST_TIMEOUT}
      - --min-instances=${_MIN_INSTANCES}
      - --no-cpu-throttling

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${BUILD_ID}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest
